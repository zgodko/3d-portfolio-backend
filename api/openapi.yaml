openapi: 3.0.3
info:
  title: 3D Portfolio Backend API
  description: API для получения списка 3D моделей и их деталей
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Локальный сервер для разработки

paths:
  /api/models:
    get:
      summary: Получить список 3D моделей с пагинацией
      description: Возвращает краткую информацию о моделях с поддержкой пагинации
      operationId: listModels
      parameters:
        - name: page
          in: query
          required: false
          description: Номер страницы (начинается с 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Количество моделей на странице
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedModelsResponse'
        '500':
          description: Внутренняя ошибка сервера

  /api/models/{id}:
    get:
      summary: Получить детали конкретной модели
      description: Возвращает полную информацию о модели со всеми картинками
      operationId: getModelById
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный идентификатор модели
          schema:
            type: string
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelDetails'
        '404':
          description: Модель не найдена
        '500':
          description: Внутренняя ошибка сервера

components:
  schemas:
    PaginatedModelsResponse:
      type: object
      required:
        - models
        - total
        - page
        - limit
        - totalPages
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelSummary'
        total:
          type: integer
          description: Общее количество моделей
          example: 54
        page:
          type: integer
          description: Текущая страница
          example: 1
        limit:
          type: integer
          description: Количество моделей на странице
          example: 10
        totalPages:
          type: integer
          description: Общее количество страниц
          example: 6

    ModelSummary:
      type: object
      required:
        - id
        - name
        - preview_image_url
      properties:
        id:
          type: string
          example: "model-001"
        name:
          type: string
          example: "Sci-Fi Corridor"
        preview_image_url:
          type: string
          format: uri
          example: "https://example.com/images/corridor-preview.jpg"
        category:
          type: string
          example: "Environment"
        created_at:
          type: string
          format: date
          example: "2026-05-15"

    ModelDetails:
      type: object
      required:
        - id
        - name
        - description
        - images
      properties:
        id:
          type: string
          example: "model-001"
        name:
          type: string
          example: "Sci-Fi Corridor"
        description:
          type: string
          example: "Детализированная модель коридора космической станции"
        category:
          type: string
          example: "Environment"
        polygon_count:
          type: integer
          example: 45000
        created_at:
          type: string
          format: date
          example: "2026-05-15"
        tags:
          type: array
          items:
            type: string
          example: ["sci-fi", "corridor", "space", "pbr"]
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        software:
          type: string
          example: "Blender 4.0, Substance Painter"

    Image:
      type: object
      required:
        - url
        - alt
      properties:
        url:
          type: string
          format: uri
          example: "https://example.com/images/corridor-01.jpg"
        alt:
          type: string
          example: "Вид коридора спереди"