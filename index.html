<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Портфолио</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Иконка сайта -->
    <link rel="icon" type="image/png" href="images/icon.png" sizes="32x32">
    <link rel="icon" type="image/png" href="images/icon.png" sizes="192x192">
    <link rel="apple-touch-icon" href="images/icon.png">
</head>

<body>
    <header>
        <h1>3D Портфолио</h1>
        <p class="subtitle">Коллекция моих 3D моделей</p>
    </header>

    <main>
        <!-- Строка поиска -->
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Поиск по названию или тегам...">
            <button id="search-clear" class="search-clear" style="display: none;">✕</button>
        </div>

        <div id="models-grid" class="models-grid">
            <!-- Карточки моделей будут добавлены через JavaScript -->
        </div>

        <!-- Пагинация -->
        <div id="pagination" class="pagination">
            <!-- Кнопки пагинации будут добавлены через JavaScript -->
        </div>
    </main>

    <!-- Модальное окно для деталей модели -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body">
                <!-- Детали модели будут добавлены через JavaScript -->
            </div>
        </div>
    </div>

    <!-- Lightbox для полноэкранного просмотра -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="">
    </div>

    <footer>
        <p>&copy; 2026 3D Портфолио. Александр Згодько. @zgodko. Все права защищены.</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
